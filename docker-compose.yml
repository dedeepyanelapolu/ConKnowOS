version: '3.8'

services:
  # Core ContextOS Microkernel Server
  contextos_kernel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contextos_microkernel
    ports:
      - "8080:8080"
    environment:
      - CONTEXTOS_HOST=0.0.0.0
      - CONTEXTOS_PORT=8080
      - REDIS_URL=redis://redis_memory:6379/0
      - QDRANT_URL=http://qdrant_vector:6333
      - NEO4J_URI=bolt://neo4j_graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - POSTGRES_DSN=postgresql://contextos:secret@postgres_db:5432/contextos_db
    depends_on:
      - redis_memory
      - qdrant_vector
      - neo4j_graph
      - postgres_db

  # Working Memory Cache (Redis)
  redis_memory:
    image: redis:7-alpine
    container_name: contextos_redis
    ports:
      - "6379:6379"

  # Episodic Vector Search (Qdrant)
  qdrant_vector:
    image: qdrant/qdrant:latest
    container_name: contextos_qdrant
    ports:
      - "6333:6333"

  # Knowledge Graph (Neo4j)
  neo4j_graph:
    image: neo4j:5-community
    container_name: contextos_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123

  # Relational State Checkpoint & Audit Store (PostgreSQL)
  postgres_db:
    image: postgres:16-alpine
    container_name: contextos_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=contextos
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=contextos_db
